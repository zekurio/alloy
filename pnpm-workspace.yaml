packages:
  - "packages/*"

allowBuilds:
  # Download Electron only when the macOS/Windows desktop app is run, keeping
  # server installs and CI free of the large platform binary.
  electron: false
  # electron-builder pulls this in for Squirrel.Windows support. Alloy's first
  # Windows target is NSIS, so keep this transitive build script disabled.
  electron-winstaller: false
  esbuild: true
  # Native image decoding for server-side BlurHash computation (game art).
  sharp: true

overrides:
  esbuild: 0.28.1
  form-data: 4.0.6
  undici: 7.28.0
