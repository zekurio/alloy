packages:
  - "packages/*"

allowBuilds:
  # Electron's prebuilt binary is downloaded via Nix (electron_42) instead, so
  # its npm postinstall is intentionally disabled (see ELECTRON_SKIP_BINARY_DOWNLOAD).
  electron: false
  # electron-builder pulls this in for Squirrel.Windows support. Alloy's first
  # Windows target is NSIS, so keep this transitive build script disabled.
  electron-winstaller: false
  esbuild: true

overrides:
  esbuild: 0.28.0
