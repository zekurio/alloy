services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: alloy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d alloy"]
      interval: 5s
      timeout: 5s
      retries: 10

  machine-learning:
    build:
      context: ./machine-learning
      args:
        DEVICE: cpu
    profiles: ["ml"]
    restart: unless-stopped
    environment:
      ALLOY_ML_HOST: 0.0.0.0
      ALLOY_ML_PORT: 3003
      MACHINE_LEARNING_GAME_CLASSIFIER_VERSION: v1-broad-efficientnet-b2-20260530-202943
    ports:
      - "3003:3003"
    volumes:
      - ./data/ml-cache:/cache

volumes:
  postgres-data:
