services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: alloy
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - target: 5432
        published: "0"
        host_ip: 127.0.0.1
    volumes:
      - alloy-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d alloy"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  alloy-postgres:
