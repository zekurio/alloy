name: Feature request
description: Propose a new feature or improvement
labels: ["enhancement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of Alloy would this change?
      options:
        - Desktop app
        - Recorder / clip capture
        - Server / API
        - Web app
        - Upload / encoding pipeline
        - Packaging / Nix
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: >-
        What are you trying to do that Alloy doesn't support today? Describe
        the use case, not just the missing feature.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should this work? Rough ideas are fine.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you use today or other approaches you ruled out.
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
