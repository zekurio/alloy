name: Publish Container Image
description: Build and publish a container image to GHCR

inputs:
  github-token:
    description: GitHub token used for GHCR login
    required: true
  images:
    description: Target image name list for docker metadata action
    required: true
  tags:
    description: Tag rules for docker metadata action
    required: true
  context:
    description: Build context path
    required: false
    default: .
  file:
    description: Dockerfile path
    required: false
    default: ./Dockerfile
  push:
    description: Whether to push the built image
    required: false
    default: "true"
  build-args:
    description: Optional Docker build args passed to the image build
    required: false
    default: ""
  provenance:
    description: Whether to publish BuildKit provenance attestations
    required: false
    default: "false"
  sbom:
    description: Whether to publish BuildKit SBOM attestations
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to GHCR
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.github-token }}

    - name: Extract image metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ inputs.images }}
        tags: ${{ inputs.tags }}

    - name: Build and push image
      uses: docker/build-push-action@v7
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.file }}
        build-args: ${{ inputs.build-args }}
        push: ${{ inputs.push }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        provenance: ${{ inputs.provenance }}
        sbom: ${{ inputs.sbom }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
