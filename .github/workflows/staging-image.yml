name: Publish Staging Container Image

on:
  push:
    branches:
      - staging
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to publish as staging
        required: false
        default: staging
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: staging-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    name: Publish staging images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.8.0

      - name: Set up Nix
        uses: cachix/install-nix-action@v31

      - name: Resolve staging metadata
        id: meta
        shell: bash
        run: |
          short_sha="$(git rev-parse --short=12 HEAD)"
          export SHORT_SHA="$short_sha"

          # shellcheck disable=SC2016
          version="$(deno eval '
          import { readFileSync } from "node:fs";

          const config = JSON.parse(readFileSync("deno.json", "utf8"));
          const stableCore = String(config.version).replace(/[-+].*$/, "");
          const match = /^(\d+)\.(\d+)\.(\d+)$/.exec(stableCore);

          if (!match) {
            console.error(`Invalid deno.json version: ${config.version}`);
            Deno.exit(1);
          }

          const [, major, minor, patch] = match;
          const runNumber = Deno.env.get("GITHUB_RUN_NUMBER");
          const shortSha = Deno.env.get("SHORT_SHA");
          console.log(`${major}.${minor}.${patch}-staging.${runNumber}.${shortSha}`);
          ')"

          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "sha_tag=staging-$short_sha" >> "$GITHUB_OUTPUT"
      - name: Stamp staging version into deno.json
        shell: bash
        env:
          STAGING_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          # Ephemeral (never committed): the Nix image reads its version from
          # deno.json, so stamp it here to make APP_VERSION and the OCI version
          # label report the staging build version.
          # shellcheck disable=SC2016
          deno eval '
          import { readFileSync, writeFileSync } from "node:fs";
          const config = JSON.parse(readFileSync("deno.json", "utf8"));
          config.version = Deno.env.get("STAGING_VERSION");
          writeFileSync("deno.json", `${JSON.stringify(config, null, 2)}\n`);
          '

      - name: Publish server image
        uses: ./.github/actions/publish-nix-image
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=staging
            type=raw,value=${{ steps.meta.outputs.sha_tag }}

      - name: Publish machine learning image
        uses: ./.github/actions/publish-image
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-machine-learning
          context: machine-learning
          file: machine-learning/Dockerfile
          build-args: |
            DEVICE=cpu
          tags: |
            type=raw,value=staging
            type=raw,value=${{ steps.meta.outputs.sha_tag }}
