name: Nix Package

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: nix-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Build package
        run: nix build .#alloy --print-build-logs --out-link result-alloy

      - name: Export binary cache
        shell: bash
        run: |
          version="$(nix eval --raw .#alloy.version)"
          cache_dir="alloy-${version}-x86_64-linux-nix-cache"
          nix copy --to "file://$cache_dir" .#alloy
          tar --zstd -cf "${cache_dir}.tar.zst" "$cache_dir"
          echo "artifact=${cache_dir}.tar.zst" >> "$GITHUB_ENV"

      - name: Upload package cache
        uses: actions/upload-artifact@v4
        with:
          name: alloy-nix-cache-x86_64-linux
          path: ${{ env.artifact }}
          if-no-files-found: error
          retention-days: 14
