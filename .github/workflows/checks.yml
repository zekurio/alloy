name: Lint, Check and Build

on:
  push:

permissions:
  contents: read

concurrency:
  group: push-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  basic-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm run lint:github

      - name: Run typecheck
        run: pnpm run typecheck

      - name: Run app build
        env:
          NODE_ENV: production
        run: pnpm run build
