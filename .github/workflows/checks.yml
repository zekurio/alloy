name: Lint, Check and Build

on:
  push:

permissions:
  contents: read

concurrency:
  group: push-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  basic-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.14

      - name: Install dependencies
        run: deno install --frozen

      - name: Run lint
        run: deno task lint:github

      - name: Run typecheck
        run: deno task typecheck

      - name: Run app build
        env:
          NODE_ENV: production
        run: deno task build
