name: Lint, Check and Build

on:
  push:

permissions:
  contents: read

concurrency:
  group: push-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  basic-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile --omit optional

      - name: Run lint
        run: bun run lint:github

      - name: Run typecheck
        run: bun run typecheck

      - name: Run app build
        env:
          NODE_ENV: production
        run: bun run build
