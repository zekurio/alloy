name: Lint, Check and Build

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  basic-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.8.0

      - name: Install dependencies
        run: deno install --frozen

      - name: Run lint
        run: deno task lint:github

      - name: Run typecheck
        run: deno task typecheck

      - name: Run app build
        env:
          NODE_ENV: production
        run: deno task build

  nix-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Nix
        uses: cachix/install-nix-action@v31

      - name: Set up Cachix
        uses: cachix/cachix-action@v15
        with:
          name: zekurio
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Evaluate Nix flake
        run: nix --extra-experimental-features "nix-command flakes" flake check --no-build

      - name: Build Nix package
        run: nix --extra-experimental-features "nix-command flakes" build .#alloy --no-link

      - name: Build Nix server image
        run: nix --extra-experimental-features "nix-command flakes" build .#alloy-image --no-link
