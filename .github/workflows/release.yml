name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish
        required: true
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    name: Publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Resolve release version
        id: meta
        shell: bash
        run: |
          raw="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          version="${raw#v}"

          if [[ "$raw" != v* ]]; then
            echo "Release refs must be v-prefixed tags." >&2
            exit 1
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Invalid release version: $raw" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure tag points at main
        shell: bash
        run: |
          git fetch origin "+refs/heads/main:refs/remotes/origin/main"
          release_commit="$(git rev-list -n 1 "${{ steps.meta.outputs.tag }}")"

          if ! git merge-base --is-ancestor "$release_commit" origin/main; then
            echo "Release tag ${{ steps.meta.outputs.tag }} must point at a commit on main." >&2
            exit 1
          fi

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.8.0

      - name: Set up Nix
        uses: cachix/install-nix-action@v31

      - name: Set up Cachix for stable release cache
        if: steps.meta.outputs.is_prerelease == 'false'
        uses: cachix/cachix-action@v15
        with:
          name: zekurio
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Validate Deno version matches release
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          actual="$(deno eval 'import { readFileSync } from "node:fs"; console.log(JSON.parse(readFileSync("deno.json", "utf8")).version);')"

          if [[ "$actual" != "$RELEASE_VERSION" ]]; then
            echo "deno.json version $actual does not match release $RELEASE_VERSION." >&2
            exit 1
          fi

      - name: Install dependencies
        run: deno install --frozen

      - name: Check formatting
        run: deno task fmt:check

      - name: Run lint
        run: deno task lint:github

      - name: Run typecheck
        run: deno task typecheck

      - name: Run app build
        env:
          NODE_ENV: production
        run: deno task build

      - name: Evaluate Nix flake
        run: nix --extra-experimental-features "nix-command flakes" flake check --no-build

      - name: Build Nix package
        run: nix --extra-experimental-features "nix-command flakes" build .#alloy --no-link

      - name: Resolve release target
        id: release_target
        shell: bash
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Publish server release image
        uses: ./.github/actions/publish-nix-image
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.meta.outputs.tag }}
            type=raw,value=latest,enable=${{ steps.meta.outputs.make_latest == 'true' }}

      - name: Publish machine learning release image
        uses: ./.github/actions/publish-image
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-machine-learning
          context: machine-learning
          file: machine-learning/Dockerfile
          build-args: |
            DEVICE=cpu
          tags: |
            type=raw,value=${{ steps.meta.outputs.tag }}
            type=raw,value=latest,enable=${{ steps.meta.outputs.make_latest == 'true' }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ steps.release_target.outputs.sha }}
          name: Alloy ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ steps.meta.outputs.is_prerelease }}
          make_latest: ${{ steps.meta.outputs.make_latest }}
