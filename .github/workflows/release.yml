name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version (for example 1.6.0 or v1.6.0)
        required: true
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'dev' || github.ref }}
          fetch-depth: 0

      - name: Resolve release version
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            raw="${{ github.event.inputs.version }}"
          else
            raw="${GITHUB_REF_NAME}"
          fi

          version="${raw#v}"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $raw" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure release tag does not already exist
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists locally." >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists on origin." >&2
            exit 1
          fi

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.14

      - name: Install dependencies
        run: deno install --frozen

      - name: Run lint
        run: deno task lint:github

      - name: Run typecheck
        run: deno task typecheck

      - name: Run app build
        env:
          NODE_ENV: production
        run: deno task build

      - name: Update package version
        if: github.event_name == 'workflow_dispatch'
        id: version_bump
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          deno eval '
          import { appendFileSync, readFileSync, writeFileSync } from "node:fs";

          function setOutput(name, value) {
            appendFileSync(Deno.env.get("GITHUB_OUTPUT"), `${name}=${value}\n`);
          }

          const filePath = "package.json";
          const pkg = JSON.parse(readFileSync(filePath, "utf8"));

          if (pkg.version === Deno.env.get("RELEASE_VERSION")) {
            console.log(`package.json is already at version ${pkg.version}.`);
            setOutput("changed", "false");
            Deno.exit(0);
          }

          pkg.version = Deno.env.get("RELEASE_VERSION");
          writeFileSync(filePath, `${JSON.stringify(pkg, null, 2)}\n`);
          setOutput("changed", "true");
          '

      - name: Configure git author
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit release version and create tag
        if: github.event_name == 'workflow_dispatch'
        id: git_release
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          if [[ "${{ steps.version_bump.outputs.changed }}" == "true" ]]; then
            git add package.json
            git commit -m "chore(release): prepare $RELEASE_TAG"
          else
            echo "package.json already matches $RELEASE_VERSION; tagging current dev commit."
          fi

          git tag -a "$RELEASE_TAG" -m "Release $RELEASE_TAG"

      - name: Resolve release target
        id: release_target
        shell: bash
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Resolve previous release tag
        id: previous_tag
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          previous_tag="$(git describe --tags --abbrev=0 --match 'v[0-9]*' "$RELEASE_TAG^" 2>/dev/null || true)"
          echo "tag=$previous_tag" >> "$GITHUB_OUTPUT"

      - name: Publish release images
        uses: ./.github/actions/publish-image
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          file: apps/server/Dockerfile
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
          tags: |
            type=raw,value=${{ steps.meta.outputs.tag }}
            type=raw,value=latest,enable=${{ steps.meta.outputs.make_latest == 'true' }}

      - name: Push release commit and tag
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          git push origin HEAD:dev
          git push origin "$RELEASE_TAG"

      - name: Publish GitHub release
        if: steps.previous_tag.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ steps.release_target.outputs.sha }}
          name: Alloy ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          previous_tag: ${{ steps.previous_tag.outputs.tag }}
          prerelease: ${{ steps.meta.outputs.is_prerelease }}
          make_latest: ${{ steps.meta.outputs.make_latest }}

      - name: Publish first GitHub release
        if: steps.previous_tag.outputs.tag == ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ steps.release_target.outputs.sha }}
          name: Alloy ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ steps.meta.outputs.is_prerelease }}
          make_latest: ${{ steps.meta.outputs.make_latest }}
