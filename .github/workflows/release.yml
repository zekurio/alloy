name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump applied to the current version; pre* bumps continue an rc cycle, patch/minor/major finish one
        required: true
        default: prerelease
        type: choice
        options:
          - prerelease
          - prepatch
          - preminor
          - premajor
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    name: Version, tag, and push
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      sha: ${{ steps.pushed.outputs.sha }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.4.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Resolve release version
        id: meta
        shell: bash
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          npm version "$BUMP" --preid rc --no-git-tag-version >/dev/null
          version="$(node -p 'require("./package.json").version')"
          git checkout -- package.json

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Invalid release version: $version" >&2
            exit 1
          fi

          tag="v$version"

          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists locally." >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists on origin." >&2
            exit 1
          fi

          if [[ "$version" == *-* ]]; then
            is_prerelease=true
          else
            is_prerelease=false
          fi

          {
            echo "version=$version"
            echo "tag=$tag"
            echo "is_prerelease=$is_prerelease"
          } >> "$GITHUB_OUTPUT"

      - name: Update package versions
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          node scripts/update-release-package-versions.mjs "$RELEASE_VERSION"

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Check formatting
        run: corepack pnpm fmt:check

      - name: Run lint
        run: corepack pnpm lint:github

      - name: Run typecheck
        run: corepack pnpm typecheck

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and tag release
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          if ! git diff --quiet -- package.json packages/desktop/package.json packages/recorder/package.json packages/recorder/Cargo.toml packages/recorder/Cargo.lock pnpm-lock.yaml; then
            git add package.json packages/desktop/package.json packages/recorder/package.json packages/recorder/Cargo.toml packages/recorder/Cargo.lock pnpm-lock.yaml
            git commit -m "chore(release): prepare $RELEASE_TAG"
          fi

          git tag -a "$RELEASE_TAG" -m "Release $RELEASE_TAG"

      - name: Push release commit and tag
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          git push --atomic origin HEAD:main "refs/tags/$RELEASE_TAG"

      - name: Record release commit
        id: pushed
        shell: bash
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  server:
    name: Build server bundle and validate Nix package
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.4.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Set up Nix
        uses: cachix/install-nix-action@v31

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build server and web
        env:
          NODE_ENV: production
        run: |
          corepack pnpm --filter @alloy/web build
          corepack pnpm --filter @alloy/server build

      - name: Evaluate Nix flake
        run: nix --extra-experimental-features "nix-command flakes" flake check --no-build

      - name: Build Nix package
        run: nix --extra-experimental-features "nix-command flakes" build .#alloy --no-link

      - name: Build Nix container image
        run: nix --extra-experimental-features "nix-command flakes" build .#alloy-image --no-link

      - name: Package server bundle
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          stage="$RUNNER_TEMP/server-stage/alloy-server"
          mkdir -p "$stage"

          corepack pnpm --filter @alloy/server --prod deploy --legacy "$stage/server"
          cp -R packages/web/dist "$stage/web"
          cp -R packages/db/drizzle "$stage/migrations"

          mkdir -p release-assets
          tar -czf "release-assets/alloy-server-v$RELEASE_VERSION-linux-x64.tar.gz" -C "$RUNNER_TEMP/server-stage" alloy-server

      - name: Upload server release assets
        uses: actions/upload-artifact@v7
        with:
          name: server-release-assets
          path: release-assets/*.tar.gz
          if-no-files-found: error

  desktop:
    name: Build Windows desktop installer
    runs-on: windows-latest
    needs: prepare

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.4.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Stage OBS runtime
        shell: pwsh
        env:
          OBS_STUDIO_VERSION: 32.1.2
        run: |
          $ErrorActionPreference = "Stop"
          $archive = Join-Path $env:RUNNER_TEMP "obs-studio.zip"
          $runtimeDir = Join-Path $env:RUNNER_TEMP "obs-runtime"
          $downloadUrl = "https://github.com/obsproject/obs-studio/releases/download/$env:OBS_STUDIO_VERSION/OBS-Studio-$env:OBS_STUDIO_VERSION-Windows-x64.zip"

          Invoke-WebRequest -Uri $downloadUrl -OutFile $archive

          if (Test-Path $runtimeDir) {
            Remove-Item -LiteralPath $runtimeDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $runtimeDir | Out-Null
          Expand-Archive -Path $archive -DestinationPath $runtimeDir

          $obsDll = Join-Path $runtimeDir "bin\64bit\obs.dll"
          if (!(Test-Path $obsDll)) {
            Write-Error "Downloaded OBS runtime is invalid; missing $obsDll."
          }

          "ALLOY_OBS_RUNTIME_DIR=$runtimeDir" >> $env:GITHUB_ENV
          "ALLOY_REQUIRE_OBS_RUNTIME=1" >> $env:GITHUB_ENV

      - name: Build Windows desktop installer
        env:
          NODE_ENV: production
        run: corepack pnpm --filter @alloy/desktop dist:win:installer

      - name: Package recorder runtime
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          $ErrorActionPreference = "Stop"
          $releaseDir = "packages/desktop/release"
          $artifactName = "alloy-recorder-v$env:RELEASE_VERSION-windows-x64.zip"
          $artifactPath = Join-Path $releaseDir $artifactName

          New-Item -ItemType Directory -Path $releaseDir -Force | Out-Null
          Compress-Archive -Path "packages/recorder/dist/*" -DestinationPath $artifactPath -Force

      - name: Validate desktop release assets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $releaseDir = "packages/desktop/release"

          if (-not (Get-ChildItem -LiteralPath $releaseDir -Filter "*.exe" -File)) {
            Write-Error "No Windows installer was produced in $releaseDir."
          }
          if (-not (Test-Path (Join-Path $releaseDir "latest.yml"))) {
            Write-Error "No Electron updater metadata was produced in $releaseDir."
          }

      - name: Upload desktop release assets
        uses: actions/upload-artifact@v7
        with:
          name: desktop-release-assets
          path: |
            packages/desktop/release/*.exe
            packages/desktop/release/*.zip
            packages/desktop/release/*.blockmap
            packages/desktop/release/latest.yml
          if-no-files-found: error

  draft:
    name: Create draft release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - server
      - desktop

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          pattern: "*-release-assets"
          path: release-assets
          merge-multiple: true

      - name: Generate release checksums
        shell: bash
        run: |
          tmp="$(mktemp)"
          (
            cd release-assets
            find . -maxdepth 1 -type f -printf '%P\n' | sort | while IFS= read -r file; do
              sha256sum "$file"
            done
          ) > "$tmp"
          mv "$tmp" release-assets/checksums.txt
          cat release-assets/checksums.txt

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ needs.prepare.outputs.sha }}
          name: Alloy ${{ needs.prepare.outputs.tag }}
          draft: true
          generate_release_notes: true
          prerelease: ${{ needs.prepare.outputs.is_prerelease }}
          files: |
            release-assets/*.exe
            release-assets/*.zip
            release-assets/*.tar.gz
            release-assets/*.blockmap
            release-assets/latest.yml
            release-assets/checksums.txt
          fail_on_unmatched_files: true
