name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (for example 1.6.0 or v1.6.0)
        required: true
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: dev
          fetch-depth: 0

      - name: Resolve release version
        id: meta
        shell: bash
        run: |
          raw="${{ github.event.inputs.version }}"
          version="${raw#v}"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $raw" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure release tag does not already exist
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists locally." >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists on origin." >&2
            exit 1
          fi

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm run lint:github

      - name: Run typecheck
        run: pnpm run typecheck

      - name: Run app build
        env:
          NODE_ENV: production
        run: pnpm run build

      - name: Update package version
        id: version_bump
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          node --input-type=module <<'EOF'
          import { readFileSync, writeFileSync } from "node:fs";

          const filePath = "package.json";
          const pkg = JSON.parse(readFileSync(filePath, "utf8"));

          if (pkg.version === process.env.RELEASE_VERSION) {
            console.error(`package.json is already at version ${pkg.version}.`);
            process.exit(1);
          }

          pkg.version = process.env.RELEASE_VERSION;
          writeFileSync(filePath, `${JSON.stringify(pkg, null, 2)}\n`);
          EOF

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit release version and create tag
        id: git_release
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          git add package.json
          git commit -m "chore(release): prepare $RELEASE_TAG"
          git tag -a "$RELEASE_TAG" -m "Release $RELEASE_TAG"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Publish release images
        uses: ./.github/actions/publish-image
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-server
          file: apps/server/Dockerfile
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
          tags: |
            type=raw,value=${{ steps.meta.outputs.tag }}
            type=raw,value=latest,enable=${{ steps.meta.outputs.make_latest == 'true' }}

      - name: Publish release web image
        uses: ./.github/actions/publish-image
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web
          file: apps/web/Dockerfile
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
          tags: |
            type=raw,value=${{ steps.meta.outputs.tag }}
            type=raw,value=latest,enable=${{ steps.meta.outputs.make_latest == 'true' }}

      - name: Publish release aio image
        uses: ./.github/actions/publish-image
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-aio
          file: docker/Dockerfile
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
          tags: |
            type=raw,value=${{ steps.meta.outputs.tag }}
            type=raw,value=latest,enable=${{ steps.meta.outputs.make_latest == 'true' }}

      - name: Push release commit and tag
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          git push origin HEAD:dev
          git push origin "$RELEASE_TAG"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ steps.git_release.outputs.sha }}
          name: Alloy ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ steps.meta.outputs.is_prerelease }}
          make_latest: ${{ steps.meta.outputs.make_latest }}
