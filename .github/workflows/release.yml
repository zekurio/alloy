name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "!v*-nightly.*"
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel
        required: true
        default: stable
        type: choice
        options:
          - stable
          - nightly
      version:
        description: Stable version to release, for example 1.2.3 or v1.2.3
        required: false
        type: string

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check_changes:
    name: Check for nightly changes
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - id: check
        name: Compare main to last nightly
        shell: bash
        run: |
          last_nightly_tag="$(git tag --list 'v*-nightly.*' --sort=-creatordate | head -n 1)"

          if [[ -z "$last_nightly_tag" ]]; then
            echo "No previous nightly tag found; releasing."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          last_nightly_sha="$(git rev-parse "$last_nightly_tag^{commit}")"
          head_sha="$(git rev-parse HEAD)"

          if [[ "$last_nightly_sha" == "$head_sha" ]]; then
            echo "No changes since $last_nightly_tag; skipping nightly release."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changes detected since $last_nightly_tag; releasing."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  preflight:
    name: Preflight
    needs: [check_changes]
    if: |
      !failure() &&
      !cancelled() &&
      (github.event_name != 'push' || github.actor != 'github-actions[bot]') &&
      (github.event_name != 'schedule' || needs.check_changes.outputs.has_changes == 'true')
    runs-on: ubuntu-latest
    outputs:
      release_channel: ${{ steps.meta.outputs.release_channel }}
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      make_latest: ${{ steps.meta.outputs.make_latest }}
      update_channel: ${{ steps.meta.outputs.update_channel }}
      update_manifest: ${{ steps.meta.outputs.update_manifest }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      previous_tag: ${{ steps.previous_tag.outputs.previous_tag }}
      ref: ${{ steps.meta.outputs.ref }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.4.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - id: meta
        name: Resolve release metadata
        shell: bash
        env:
          DISPATCH_CHANNEL: ${{ github.event.inputs.channel }}
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
          RUN_STARTED_AT: ${{ github.run_started_at }}
        run: |
          release_ref="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short=12 HEAD)"

          if [[ "${GITHUB_EVENT_NAME}" == "schedule" || ( "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${DISPATCH_CHANNEL}" == "nightly" ) ]]; then
            target_version="$(node -e '
              const { readFileSync } = require("node:fs");
              const version = JSON.parse(readFileSync("package.json", "utf8")).version;
              const match = /^([0-9]+)\.([0-9]+)\.([0-9]+)$/.exec(String(version));
              if (!match) {
                console.error(`Invalid package.json version: ${version}`);
                process.exit(1);
              }
              const [, major, minor, patch] = match;
              console.log(`${major}.${minor}.${Number(patch) + 1}`);
            ')"
            nightly_date="$(date -u -d "$RUN_STARTED_AT" +%Y%m%d)"
            version="$target_version-nightly.$nightly_date.${GITHUB_RUN_NUMBER}"
            tag="v$version"

            {
              echo "release_channel=nightly"
              echo "version=$version"
              echo "tag=$tag"
              echo "release_name=Alloy Nightly $version ($short_sha)"
              echo "is_prerelease=true"
              echo "make_latest=false"
              echo "update_channel=nightly"
              echo "update_manifest=nightly.yml"
              echo "ref=$release_ref"
              echo "short_sha=$short_sha"
            } >> "$GITHUB_OUTPUT"
          else
            if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
              raw="${DISPATCH_VERSION}"
              if [[ -z "$raw" ]]; then
                echo "Stable workflow dispatch releases require the version input." >&2
                exit 1
              fi
            else
              raw="${GITHUB_REF_NAME}"
            fi

            version="${raw#v}"
            tag="v$version"

            if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Stable release versions must be plain semver (vX.Y.Z), got: $raw" >&2
              exit 1
            fi

            if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
              if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
                echo "Stable release tag $tag already exists." >&2
                exit 1
              fi

              node scripts/update-release-package-versions.mjs "$version" --desktop-channel latest --github-output

              if [[ -n "$(git status --porcelain)" ]]; then
                git config user.name "github-actions[bot]"
                git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                git add package.json packages/desktop/package.json packages/recorder/package.json packages/recorder/Cargo.toml packages/recorder/Cargo.lock
                git commit -m "chore(release): bump version to $version"
                git push origin "HEAD:${GITHUB_REF_NAME}"
              fi

              release_ref="$(git rev-parse HEAD)"
              short_sha="$(git rev-parse --short=12 HEAD)"
              git tag "$tag" "$release_ref"
              git push origin "$tag"
            else
              RELEASE_VERSION="$version" node -e '
                const { readFileSync } = require("node:fs");
                const expected = process.env.RELEASE_VERSION;
                const packageFiles = [
                  "package.json",
                  "packages/desktop/package.json",
                  "packages/recorder/package.json",
                ];
                const mismatches = packageFiles.filter((filePath) => {
                  const actual = JSON.parse(readFileSync(filePath, "utf8")).version;
                  return actual !== expected;
                });
                if (mismatches.length > 0) {
                  console.error(
                    `Stable release ${expected} requires matching package versions in: ${mismatches.join(", ")}`,
                  );
                  process.exit(1);
                }
              '
            fi

            {
              echo "release_channel=stable"
              echo "version=$version"
              echo "tag=$tag"
              echo "release_name=Alloy v$version"
              echo "is_prerelease=false"
              echo "make_latest=true"
              echo "update_channel=latest"
              echo "update_manifest=latest.yml"
              echo "ref=$release_ref"
              echo "short_sha=$short_sha"
            } >> "$GITHUB_OUTPUT"
          fi

      - id: previous_tag
        name: Resolve previous release tag
        shell: bash
        env:
          RELEASE_CHANNEL: ${{ steps.meta.outputs.release_channel }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          if [[ "$RELEASE_CHANNEL" == "nightly" ]]; then
            previous_tag="$(
              git tag --list 'v*-nightly.*' --sort=-creatordate |
                grep -Fxv "$RELEASE_TAG" |
                head -n 1 || true
            )"
          else
            previous_tag="$(
              git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname |
                grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' |
                grep -Fxv "$RELEASE_TAG" |
                head -n 1 || true
            )"
          fi

          echo "previous_tag=$previous_tag" >> "$GITHUB_OUTPUT"

      - name: Check formatting
        run: corepack pnpm fmt:check

      - name: Run lint
        run: corepack pnpm lint:github

      - name: Run typecheck
        run: corepack pnpm typecheck

  desktop:
    name: Build Windows desktop release
    needs: [preflight]
    if: ${{ !failure() && !cancelled() && needs.preflight.result == 'success' }}
    runs-on: windows-latest

    steps:
      - name: Checkout release source
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.preflight.outputs.ref }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.4.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Stamp release version and updater channel
        shell: bash
        run: |
          node scripts/update-release-package-versions.mjs \
            "${{ needs.preflight.outputs.version }}" \
            --desktop-channel "${{ needs.preflight.outputs.update_channel }}"

      - name: Stage OBS runtime
        shell: pwsh
        env:
          OBS_STUDIO_VERSION: 32.1.2
        run: |
          $ErrorActionPreference = "Stop"
          $archive = Join-Path $env:RUNNER_TEMP "obs-studio.zip"
          $runtimeDir = Join-Path $env:RUNNER_TEMP "obs-runtime"
          $downloadUrl = "https://github.com/obsproject/obs-studio/releases/download/$env:OBS_STUDIO_VERSION/OBS-Studio-$env:OBS_STUDIO_VERSION-Windows-x64.zip"

          Invoke-WebRequest -Uri $downloadUrl -OutFile $archive

          if (Test-Path $runtimeDir) {
            Remove-Item -LiteralPath $runtimeDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $runtimeDir | Out-Null
          Expand-Archive -Path $archive -DestinationPath $runtimeDir

          $obsDll = Join-Path $runtimeDir "bin\64bit\obs.dll"
          if (!(Test-Path $obsDll)) {
            Write-Error "Downloaded OBS runtime is invalid; missing $obsDll."
          }

          "ALLOY_OBS_RUNTIME_DIR=$runtimeDir" >> $env:GITHUB_ENV
          "ALLOY_REQUIRE_OBS_RUNTIME=1" >> $env:GITHUB_ENV

      - name: Build desktop installer
        env:
          NODE_ENV: production
        run: corepack pnpm --filter @alloy/desktop dist:win:installer

      - name: Validate desktop release assets
        shell: pwsh
        env:
          UPDATE_MANIFEST: ${{ needs.preflight.outputs.update_manifest }}
        run: |
          $ErrorActionPreference = "Stop"
          $releaseDir = "packages/desktop/release"

          if (-not (Get-ChildItem -LiteralPath $releaseDir -Filter "*.exe" -File)) {
            Write-Error "No Windows installer was produced in $releaseDir."
          }
          if (-not (Test-Path (Join-Path $releaseDir $env:UPDATE_MANIFEST))) {
            Write-Error "No Electron updater metadata ($env:UPDATE_MANIFEST) was produced in $releaseDir."
          }
          if (-not (Get-ChildItem -LiteralPath $releaseDir -Filter "*.blockmap" -File)) {
            Write-Error "No Electron blockmap was produced in $releaseDir."
          }

      - name: Upload desktop release assets
        uses: actions/upload-artifact@v7
        with:
          name: desktop-release-assets
          path: |
            packages/desktop/release/*.exe
            packages/desktop/release/*.blockmap
            packages/desktop/release/${{ needs.preflight.outputs.update_manifest }}
          if-no-files-found: error

  server_image:
    name: Publish server image
    needs: [preflight]
    if: ${{ !failure() && !cancelled() && needs.preflight.result == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release source
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.preflight.outputs.ref }}

      - name: Set up Nix
        uses: cachix/install-nix-action@v31

      - name: Set up Cachix substituter
        uses: cachix/cachix-action@v17
        with:
          name: zekurio
          skipPush: true

      - name: Stamp image version
        shell: bash
        env:
          IMAGE_VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          node <<'NODE'
          const { readFileSync, writeFileSync } = require("node:fs");
          const config = JSON.parse(readFileSync("package.json", "utf8"));
          config.version = process.env.IMAGE_VERSION;
          writeFileSync("package.json", `${JSON.stringify(config, null, 2)}\n`);
          NODE

      - name: Publish server image
        uses: ./.github/actions/publish-nix-image
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.preflight.outputs.tag }}
            type=raw,value=${{ needs.preflight.outputs.update_channel }}

  publish:
    name: Publish GitHub release
    needs:
      - preflight
      - desktop
      - server_image
    if: ${{ !failure() && !cancelled() && needs.preflight.result == 'success' && needs.desktop.result == 'success' && needs.server_image.result == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Download desktop release assets
        uses: actions/download-artifact@v8
        with:
          name: desktop-release-assets
          path: release-assets

      - name: Generate release checksums
        shell: bash
        run: |
          tmp="$(mktemp)"
          (
            cd release-assets
            find . -maxdepth 1 -type f -printf '%P\n' | sort | while IFS= read -r file; do
              sha256sum "$file"
            done
          ) > "$tmp"
          mv "$tmp" release-assets/checksums.txt
          cat release-assets/checksums.txt

      - name: Write release notes
        uses: actions/github-script@v8
        env:
          RELEASE_CHANNEL: ${{ needs.preflight.outputs.release_channel }}
          RELEASE_TAG: ${{ needs.preflight.outputs.tag }}
          RELEASE_REF: ${{ needs.preflight.outputs.ref }}
          UPDATE_MANIFEST: ${{ needs.preflight.outputs.update_manifest }}
          PREVIOUS_TAG: ${{ needs.preflight.outputs.previous_tag }}
        with:
          script: |
            const fs = require("node:fs");

            const channel = process.env.RELEASE_CHANNEL;
            const tag = process.env.RELEASE_TAG;
            const manifest = process.env.UPDATE_MANIFEST;
            const previousTag = process.env.PREVIOUS_TAG;
            const { owner, repo } = context.repo;
            const image = `ghcr.io/${owner}/${repo}`;
            const floatingImage = channel === "stable" ? `${image}:latest` : `${image}:nightly`;
            const pinnedImage = `${image}:${tag}`;
            const channelName = channel === "stable" ? "Stable" : "Nightly";

            let generatedNotes = "";
            try {
              const response = await github.rest.repos.generateReleaseNotes({
                owner,
                repo,
                tag_name: tag,
                target_commitish: process.env.RELEASE_REF,
                previous_tag_name: previousTag || undefined,
              });
              generatedNotes = response.data.body.trim();
            } catch (error) {
              core.warning(`Could not generate GitHub release notes: ${error.message}`);
              generatedNotes = previousTag
                ? `Full changelog: https://github.com/${owner}/${repo}/compare/${previousTag}...${tag}`
                : `Changes are included from ${process.env.RELEASE_REF}.`;
            }

            const dockerText = channel === "stable"
              ? [
                  `Use \`${floatingImage}\` for the latest stable server image.`,
                  `Use \`${pinnedImage}\` to pin this exact release.`,
                ]
              : [
                  `Use \`${floatingImage}\` for the newest nightly server image.`,
                  `Use \`${pinnedImage}\` to pin this exact nightly.`,
                ];

            const body = [
              `## ${channelName} Desktop Release`,
              "",
              "Download the Windows x64 installer from the assets below.",
              `Auto-update clients on this channel use \`${manifest}\` and the matching blockmap asset attached to this release.`,
              "",
              "## Server Docker Image",
              "",
              ...dockerText,
              "For reproducible deployments, prefer the pinned tag.",
              "",
              "```bash",
              `docker pull ${pinnedImage}`,
              "```",
              "",
              "## Checksums",
              "",
              "See `checksums.txt` in the release assets.",
              "",
              generatedNotes,
            ].join("\n");

            fs.writeFileSync("release-notes.md", `${body}\n`);

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ needs.preflight.outputs.ref }}
          name: ${{ needs.preflight.outputs.release_name }}
          body_path: release-notes.md
          prerelease: ${{ needs.preflight.outputs.is_prerelease }}
          make_latest: ${{ needs.preflight.outputs.make_latest }}
          files: |
            release-assets/*.exe
            release-assets/*.blockmap
            release-assets/${{ needs.preflight.outputs.update_manifest }}
            release-assets/checksums.txt
          fail_on_unmatched_files: true
