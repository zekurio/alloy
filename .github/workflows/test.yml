name: test

on:
  pull_request:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix:
    name: Nix package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31.10.7
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check Nix flake
        run: nix flake check --print-build-logs

  checks:
    name: pnpm checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.13.0

      - name: Set up Node
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: corepack pnpm audit

      - name: Check formatting
        run: corepack pnpm fmt:check

      - name: Run lint
        run: corepack pnpm lint:github

      - name: Run typecheck
        run: corepack pnpm typecheck

      - name: Run tests
        run: corepack pnpm test
        # Server modules parse env at import time, so tests that touch them
        # need a syntactically valid config even without a live database
        # (DB-backed tests skip when the server is unreachable).
        env:
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/alloy
          ALLOY_VIEWER_COOKIE_SECRET: ci-only-viewer-cookie-secret-0123456789
          ALLOY_UPLOAD_HMAC_SECRET: ci-only-upload-hmac-secret-0123456789

      - name: Build server and web
        run: corepack pnpm turbo run build --filter=@alloy/server --filter=@alloy/web
