name: test

on:
  pull_request:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix:
    name: Nix package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Nix
        uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check Nix flake
        run: nix flake check --print-build-logs

  checks:
    name: pnpm checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.13.0

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: corepack pnpm audit

      - name: Check formatting
        run: corepack pnpm fmt:check

      - name: Run lint
        run: corepack pnpm lint:github

      - name: Run typecheck
        run: corepack pnpm typecheck

      - name: Prepare test environment
        shell: bash
        # Server modules parse these values at import time. Generate ephemeral
        # credentials because DB-backed tests skip when PostgreSQL is unavailable.
        run: |
          node <<'NODE'
          const { randomBytes } = require("node:crypto")
          const { appendFileSync } = require("node:fs")

          const envFile = process.env.GITHUB_ENV
          if (!envFile) throw new Error("GITHUB_ENV is not set")

          const databaseUrl = new URL("postgresql://127.0.0.1:5432/alloy")
          databaseUrl.username = "alloy"
          databaseUrl.password = randomBytes(24).toString("hex")
          appendFileSync(
            envFile,
            [
              `DATABASE_URL=${databaseUrl.toString()}`,
              `ALLOY_VIEWER_COOKIE_SECRET=${randomBytes(32).toString("hex")}`,
              `ALLOY_UPLOAD_HMAC_SECRET=${randomBytes(32).toString("hex")}`,
              "",
            ].join("\n"),
          )
          NODE

      - name: Run tests
        run: corepack pnpm test

      - name: Build server and web
        run: corepack pnpm turbo run build --filter=@alloy/server --filter=@alloy/web
