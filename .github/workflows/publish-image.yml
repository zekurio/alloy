name: Publish Nightly Container Image

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    concurrency:
      group: publish-nightly-image
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.8.0

      - name: Set up Nix
        uses: cachix/install-nix-action@v31

      - name: Set up Cachix
        uses: cachix/cachix-action@v15
        with:
          name: zekurio
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Resolve nightly version
        id: meta
        shell: bash
        run: |
          # shellcheck disable=SC2016
          version="$(deno eval '
          import { readFileSync } from "node:fs";

          const config = JSON.parse(readFileSync("deno.json", "utf8"));
          const stableCore = String(config.version).replace(/[-+].*$/, "");
          const match = /^(\d+)\.(\d+)\.(\d+)$/.exec(stableCore);

          if (!match) {
            console.error(`Invalid deno.json version: ${config.version}`);
            Deno.exit(1);
          }

          const [, major, minor, patch] = match;
          const date = new Date().toISOString().slice(0, 10).replaceAll("-", "");
          console.log(`${major}.${minor}.${Number(patch) + 1}-nightly.${date}.${Deno.env.get("GITHUB_RUN_NUMBER")}`);
          '
          )"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=nightly-v$version" >> "$GITHUB_OUTPUT"

      - name: Stamp nightly version into deno.json
        shell: bash
        env:
          NIGHTLY_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          # Ephemeral (never committed): the Nix image reads its version from
          # deno.json, so stamp it here to make APP_VERSION and the OCI version
          # label report the nightly version.
          # shellcheck disable=SC2016
          deno eval '
          import { readFileSync, writeFileSync } from "node:fs";
          const config = JSON.parse(readFileSync("deno.json", "utf8"));
          config.version = Deno.env.get("NIGHTLY_VERSION");
          writeFileSync("deno.json", `${JSON.stringify(config, null, 2)}\n`);
          '

      - name: Publish server image
        uses: ./.github/actions/publish-nix-image
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=nightly
            type=raw,value=${{ steps.meta.outputs.tag }}

      - name: Publish machine learning image
        uses: ./.github/actions/publish-image
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-machine-learning
          context: machine-learning
          file: machine-learning/Dockerfile
          build-args: |
            DEVICE=cpu
          tags: |
            type=raw,value=nightly
            type=raw,value=${{ steps.meta.outputs.tag }}
