name: Publish Nightly Container Image

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    concurrency:
      group: publish-nightly-image
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: dev

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.14

      - name: Resolve nightly version
        id: meta
        shell: bash
        run: |
          version="$(deno eval '
          import { readFileSync } from "node:fs";

          const config = JSON.parse(readFileSync("deno.json", "utf8"));
          const stableCore = String(config.version).replace(/[-+].*$/, "");
          const match = /^(\d+)\.(\d+)\.(\d+)$/.exec(stableCore);

          if (!match) {
            console.error(`Invalid deno.json version: ${config.version}`);
            Deno.exit(1);
          }

          const [, major, minor, patch] = match;
          const date = new Date().toISOString().slice(0, 10).replaceAll("-", "");
          console.log(`${major}.${minor}.${Number(patch) + 1}-nightly.${date}.${Deno.env.get("GITHUB_RUN_NUMBER")}`);
          '
          )"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=nightly-v$version" >> "$GITHUB_OUTPUT"

      - name: Publish image
        uses: ./.github/actions/publish-image
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          file: apps/server/Dockerfile
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
          tags: |
            type=raw,value=nightly
            type=raw,value=${{ steps.meta.outputs.tag }}
