name: Publish Dev/Nightly Container Image

on:
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to publish
        required: false
        default: dev
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: dev-image-${{ github.event_name == 'workflow_dispatch' && inputs.ref || 'nightly' }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    name: Publish dev images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || 'dev' }}

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.8.0

      - name: Set up Nix
        uses: cachix/install-nix-action@v31

      - name: Resolve image metadata
        id: meta
        shell: bash
        run: |
          short_sha="$(git rev-parse --short=12 HEAD)"
          channel="dev"

          if [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
            channel="nightly"
          fi

          export SHORT_SHA="$short_sha"
          export CHANNEL="$channel"

          # shellcheck disable=SC2016
          version="$(deno eval '
          import { readFileSync } from "node:fs";

          const config = JSON.parse(readFileSync("deno.json", "utf8"));
          const stableCore = String(config.version).replace(/[-+].*$/, "");
          const match = /^(\d+)\.(\d+)\.(\d+)$/.exec(stableCore);

          if (!match) {
            console.error(`Invalid deno.json version: ${config.version}`);
            Deno.exit(1);
          }

          const [, major, minor, patch] = match;
          const channel = Deno.env.get("CHANNEL");
          const runNumber = Deno.env.get("GITHUB_RUN_NUMBER");
          const shortSha = Deno.env.get("SHORT_SHA");
          console.log(`${major}.${minor}.${patch}-${channel}.${runNumber}.${shortSha}`);
          ')"

          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "sha_tag=$channel-$short_sha" >> "$GITHUB_OUTPUT"
      - name: Stamp image version into deno.json
        shell: bash
        env:
          IMAGE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          # Ephemeral (never committed): the Nix image reads its version from
          # deno.json, so stamp it here to make APP_VERSION and the OCI version
          # label report the generated container build version.
          # shellcheck disable=SC2016
          deno eval '
          import { readFileSync, writeFileSync } from "node:fs";
          const config = JSON.parse(readFileSync("deno.json", "utf8"));
          config.version = Deno.env.get("IMAGE_VERSION");
          writeFileSync("deno.json", `${JSON.stringify(config, null, 2)}\n`);
          '

      - name: Publish server image
        uses: ./.github/actions/publish-nix-image
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.meta.outputs.channel }}
            type=raw,value=${{ steps.meta.outputs.sha_tag }}

      - name: Publish machine learning image
        uses: ./.github/actions/publish-image
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-machine-learning
          context: machine-learning
          file: machine-learning/Dockerfile
          build-args: |
            DEVICE=cpu
          tags: |
            type=raw,value=${{ steps.meta.outputs.channel }}
            type=raw,value=${{ steps.meta.outputs.sha_tag }}
