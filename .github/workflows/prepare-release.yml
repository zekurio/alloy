name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (for example 0.1.0 or v0.1.0)
        required: true
        type: string
      source_branch:
        description: Branch to release from
        required: false
        default: main
        type: string
      target_branch:
        description: Branch to commit the prepared release to
        required: false
        default: main
        type: string

permissions:
  contents: write

concurrency:
  group: prepare-release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Commit release version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.source_branch }}
          fetch-depth: 0

      - name: Resolve release version
        id: meta
        shell: bash
        run: |
          raw="${{ inputs.version }}"
          version="${raw#v}"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Invalid release version: $raw" >&2
            exit 1
          fi

          tag="v$version"

          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists locally." >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists on origin." >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Update package versions
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          node <<'NODE'
          const { readFileSync, writeFileSync } = require("node:fs");
          const filePaths = ["package.json", "packages/desktop/package.json"];

          for (const filePath of filePaths) {
            const config = JSON.parse(readFileSync(filePath, "utf8"));

            if (config.version === process.env.RELEASE_VERSION) {
              console.log(`${filePath} is already at version ${config.version}.`);
              continue;
            }

            config.version = process.env.RELEASE_VERSION;
            writeFileSync(filePath, `${JSON.stringify(config, null, 2)}\n`);
          }
          NODE

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Check formatting
        run: corepack pnpm fmt:check

      - name: Run lint
        run: corepack pnpm lint:github

      - name: Run typecheck
        run: corepack pnpm typecheck

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit release version
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          if git diff --quiet -- package.json packages/desktop/package.json pnpm-lock.yaml; then
            echo "No release version commit needed."
          else
            git add package.json packages/desktop/package.json pnpm-lock.yaml
            git commit -m "chore(release): prepare $RELEASE_TAG"
          fi

      - name: Push prepared release
        shell: bash
        env:
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          git fetch origin "+refs/heads/$TARGET_BRANCH:refs/remotes/origin/$TARGET_BRANCH"

          if ! git merge-base --is-ancestor "origin/$TARGET_BRANCH" HEAD; then
            echo "Target branch $TARGET_BRANCH is not an ancestor of the prepared release commit." >&2
            echo "Merge or rebase ${{ inputs.source_branch }} first, then rerun this workflow." >&2
            exit 1
          fi

          git push origin "HEAD:$TARGET_BRANCH"
