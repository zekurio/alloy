name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump applied to the current version
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - prepatch
          - preminor
          - premajor
          - prerelease
      version:
        description: Explicit version override (for example 0.2.0); ignores bump when set
        required: false
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: prepare-release
  cancel-in-progress: false

jobs:
  prepare:
    name: Bump, tag, and start release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.4.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Resolve release version
        id: meta
        shell: bash
        env:
          BUMP: ${{ inputs.bump }}
          VERSION_OVERRIDE: ${{ inputs.version }}
        run: |
          if [[ -n "$VERSION_OVERRIDE" ]]; then
            version="${VERSION_OVERRIDE#v}"
          else
            npm version "$BUMP" --preid rc --no-git-tag-version >/dev/null
            version="$(node -p 'require("./package.json").version')"
            git checkout -- package.json
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Invalid release version: $version" >&2
            exit 1
          fi

          tag="v$version"

          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists locally." >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists on origin." >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Update package versions
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          node scripts/update-release-package-versions.mjs "$RELEASE_VERSION"

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Check formatting
        run: corepack pnpm fmt:check

      - name: Run lint
        run: corepack pnpm lint:github

      - name: Run typecheck
        run: corepack pnpm typecheck

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and tag release
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          if ! git diff --quiet -- package.json packages/desktop/package.json packages/recorder/package.json packages/recorder/Cargo.toml pnpm-lock.yaml; then
            git add package.json packages/desktop/package.json packages/recorder/package.json packages/recorder/Cargo.toml pnpm-lock.yaml
            git commit -m "chore(release): prepare $RELEASE_TAG"
          fi

          git tag -a "$RELEASE_TAG" -m "Release $RELEASE_TAG"

      - name: Push release commit and tag
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          git push origin HEAD:main "refs/tags/$RELEASE_TAG"

      - name: Start release build
        shell: bash
        env:
          # Tags pushed with GITHUB_TOKEN do not trigger the tag-push workflow,
          # so the release build has to be dispatched explicitly.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          version="${RELEASE_TAG#v}"

          gh workflow run release.yml --repo "$GITHUB_REPOSITORY" --ref main -f version="$version"
