name: Recorder Release

on:
  push:
    tags:
      - "recorder-v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Recorder release tag to publish
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: recorder-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish Windows recorder runtime
    runs-on: windows-latest

    steps:
      - name: Checkout recorder release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Resolve recorder release version
        id: meta
        shell: bash
        run: |
          raw="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          version="${raw#recorder-v}"

          if [[ "$raw" != recorder-v* ]]; then
            echo "Recorder release refs must use recorder-v-prefixed tags." >&2
            exit 1
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Invalid recorder release version: $raw" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=recorder-v$version" >> "$GITHUB_OUTPUT"

          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure tag points at main
        shell: bash
        run: |
          git fetch origin "+refs/heads/main:refs/remotes/origin/main"
          release_commit="$(git rev-list -n 1 "${{ steps.meta.outputs.tag }}")"

          if ! git merge-base --is-ancestor "$release_commit" origin/main; then
            echo "Recorder release tag ${{ steps.meta.outputs.tag }} must point at a commit on main." >&2
            exit 1
          fi

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Validate recorder package version matches release
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          package_version="$(node -e 'const fs = require("node:fs"); console.log(JSON.parse(fs.readFileSync("packages/recorder/package.json", "utf8")).version);')"
          cargo_version="$(node -e 'const fs = require("node:fs"); const m = fs.readFileSync("packages/recorder/Cargo.toml", "utf8").match(/^version = "([^"]+)"/m); console.log(m?.[1] ?? "");')"

          if [[ "$package_version" != "$RELEASE_VERSION" ]]; then
            echo "packages/recorder/package.json version $package_version does not match recorder release $RELEASE_VERSION." >&2
            exit 1
          fi

          if [[ "$cargo_version" != "$RELEASE_VERSION" ]]; then
            echo "packages/recorder/Cargo.toml version $cargo_version does not match recorder release $RELEASE_VERSION." >&2
            exit 1
          fi

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Check formatting
        run: corepack pnpm fmt:check

      - name: Run lint
        run: corepack pnpm lint:github

      - name: Run typecheck
        run: corepack pnpm typecheck

      - name: Stage OBS runtime
        shell: pwsh
        env:
          OBS_STUDIO_VERSION: 32.1.2
        run: |
          $ErrorActionPreference = "Stop"
          $archive = Join-Path $env:RUNNER_TEMP "obs-studio.zip"
          $runtimeDir = Join-Path $env:RUNNER_TEMP "obs-runtime"
          $downloadUrl = "https://github.com/obsproject/obs-studio/releases/download/$env:OBS_STUDIO_VERSION/OBS-Studio-$env:OBS_STUDIO_VERSION-Windows-x64.zip"

          Invoke-WebRequest -Uri $downloadUrl -OutFile $archive

          if (Test-Path $runtimeDir) {
            Remove-Item -LiteralPath $runtimeDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $runtimeDir | Out-Null
          Expand-Archive -Path $archive -DestinationPath $runtimeDir

          $obsDll = Join-Path $runtimeDir "bin\64bit\obs.dll"
          if (!(Test-Path $obsDll)) {
            Write-Error "Downloaded OBS runtime is invalid; missing $obsDll."
          }

          "ALLOY_OBS_RUNTIME_DIR=$runtimeDir" >> $env:GITHUB_ENV
          "ALLOY_REQUIRE_OBS_RUNTIME=1" >> $env:GITHUB_ENV

      - name: Build Windows recorder runtime
        run: corepack pnpm --filter alloy-recorder build:release

      - name: Package recorder runtime
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          $ErrorActionPreference = "Stop"
          $releaseDir = "packages/recorder/release"
          $artifactName = "alloy-recorder-v$env:RELEASE_VERSION-windows-x64.zip"
          $artifactPath = Join-Path $releaseDir $artifactName

          New-Item -ItemType Directory -Path $releaseDir -Force | Out-Null
          Compress-Archive -Path "packages/recorder/dist/*" -DestinationPath $artifactPath -Force

          $hash = Get-FileHash -LiteralPath $artifactPath -Algorithm SHA256
          "$($hash.Hash.ToLowerInvariant())  $artifactName" |
            Set-Content -LiteralPath (Join-Path $releaseDir "checksums.txt") -Encoding ascii

      - name: Resolve release target
        id: release_target
        shell: bash
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Publish recorder GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ steps.release_target.outputs.sha }}
          name: Alloy Recorder ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ steps.meta.outputs.is_prerelease }}
          make_latest: ${{ steps.meta.outputs.make_latest }}
          files: |
            packages/recorder/release/*.zip
            packages/recorder/release/checksums.txt
          fail_on_unmatched_files: true
