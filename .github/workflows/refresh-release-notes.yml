name: refresh release notes

run-name: "refresh release notes for ${{ inputs.tag }}"

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag (for example, v1.0.1)"
        required: true
        type: string
      previous_tag:
        description: "Previous release tag override (optional)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - id: release
        name: Resolve release tags
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_PREVIOUS_TAG: ${{ inputs.previous_tag }}
        run: |
          if ! git rev-parse -q --verify "refs/tags/$INPUT_TAG" >/dev/null; then
            echo "Release tag does not exist: $INPUT_TAG" >&2
            exit 1
          fi

          previous_tag="$INPUT_PREVIOUS_TAG"
          if [[ -z "$previous_tag" ]]; then
            previous_tag="$(
              git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname |
                grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' |
                awk -v tag="$INPUT_TAG" '$0 == tag { found = 1; next } found { print; exit }'
            )"
          fi

          if [[ -n "$previous_tag" ]] && ! git rev-parse -q --verify "refs/tags/$previous_tag" >/dev/null; then
            echo "Previous release tag does not exist: $previous_tag" >&2
            exit 1
          fi

          {
            echo "tag=$INPUT_TAG"
            echo "ref=$(git rev-list -n 1 "$INPUT_TAG")"
            echo "previous_tag=$previous_tag"
          } >> "$GITHUB_OUTPUT"

      - name: Write release notes
        uses: actions/github-script@v8
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_REF: ${{ steps.release.outputs.ref }}
          PREVIOUS_TAG: ${{ steps.release.outputs.previous_tag }}
        with:
          script: |
            const { writeReleaseNotes } = require("./scripts/write-release-notes.cjs")

            await writeReleaseNotes({
              github,
              context,
              core,
              tag: process.env.RELEASE_TAG,
              ref: process.env.RELEASE_REF,
              previousTag: process.env.PREVIOUS_TAG,
            })

      - name: Update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: gh release edit "$RELEASE_TAG" --notes-file release-notes.md
