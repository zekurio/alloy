name: Publish Main/Nightly Container Image

on:
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to publish
        required: false
        default: main
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: main-image-${{ github.event_name == 'workflow_dispatch' && inputs.ref || 'nightly' }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    name: Publish main images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || 'main' }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Set up Nix
        uses: cachix/install-nix-action@v31

      - name: Resolve image metadata
        id: meta
        shell: bash
        run: |
          short_sha="$(git rev-parse --short=12 HEAD)"
          channel="main"

          if [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
            channel="nightly"
          fi

          export SHORT_SHA="$short_sha"
          export CHANNEL="$channel"

          version="$(node <<'NODE'
          const { readFileSync } = require("node:fs");
          const config = JSON.parse(readFileSync("package.json", "utf8"));
          const stableCore = String(config.version).replace(/[-+].*$/, "");
          const match = /^(\d+)\.(\d+)\.(\d+)$/.exec(stableCore);

          if (!match) {
            console.error(`Invalid package.json version: ${config.version}`);
            process.exit(1);
          }

          const [, major, minor, patch] = match;
          const channel = process.env.CHANNEL;
          const runNumber = process.env.GITHUB_RUN_NUMBER;
          const shortSha = process.env.SHORT_SHA;
          console.log(`${major}.${minor}.${patch}-${channel}.${runNumber}.${shortSha}`);
          NODE
          )"

          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "sha_tag=$channel-$short_sha" >> "$GITHUB_OUTPUT"
      - name: Stamp image version into package.json
        shell: bash
        env:
          IMAGE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          # Ephemeral (never committed): the Nix image reads its version from
          # package.json, so stamp it here to make APP_VERSION and the OCI version
          # label report the generated container build version.
          node <<'NODE'
          const { readFileSync, writeFileSync } = require("node:fs");
          const config = JSON.parse(readFileSync("package.json", "utf8"));
          config.version = process.env.IMAGE_VERSION;
          writeFileSync("package.json", `${JSON.stringify(config, null, 2)}\n`);
          NODE

      - name: Publish server image
        uses: ./.github/actions/publish-nix-image
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.meta.outputs.channel }}
            type=raw,value=${{ steps.meta.outputs.sha_tag }}

      - name: Publish machine learning image
        uses: ./.github/actions/publish-image
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-machine-learning
          context: machine-learning
          file: machine-learning/Dockerfile
          build-args: |
            DEVICE=cpu
          tags: |
            type=raw,value=${{ steps.meta.outputs.channel }}
            type=raw,value=${{ steps.meta.outputs.sha_tag }}
