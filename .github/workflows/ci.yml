name: CI

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-version:
    name: Release version guard
    if: ${{ github.event_name == 'pull_request' && github.base_ref == 'main' && github.head_ref == 'dev' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Ensure release semver changed
        run: node scripts/verify-release-version-change.mjs "${{ github.event.pull_request.base.sha }}"

  nix:
    name: Nix package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check Nix flake
        run: nix flake check --print-build-logs

  checks:
    name: pnpm checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.4.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Check formatting
        run: corepack pnpm fmt:check

      - name: Run lint
        run: corepack pnpm lint:github

      - name: Run typecheck
        run: corepack pnpm typecheck

      - name: Run tests
        run: corepack pnpm test
        # Server modules parse env at import time, so tests that touch them
        # need a syntactically valid config even without a live database
        # (DB-backed tests skip when the server is unreachable).
        env:
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/alloy
          ALLOY_VIEWER_COOKIE_SECRET: ci-only-viewer-cookie-secret-0123456789
          ALLOY_UPLOAD_HMAC_SECRET: ci-only-upload-hmac-secret-0123456789

      - name: Build server and web
        run: corepack pnpm turbo run build --filter=@alloy/server --filter=@alloy/web
