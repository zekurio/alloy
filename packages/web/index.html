<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Set the theme class before paint to avoid a flash. Mirrors
      // @alloy/ui/lib/theme; keep the storage key in sync.
      try {
        var theme = localStorage.getItem("alloy.theme") || "system"
        var dark =
          theme === "dark" ||
          (theme !== "light" &&
            matchMedia("(prefers-color-scheme: dark)").matches)
        document.documentElement.classList.add(dark ? "dark" : "light")
      } catch (e) {
        document.documentElement.classList.add("dark")
      }
    </script>
    <!-- alloy:head:start -->
    <title>alloy</title>
    <meta name="description" content="Share and watch game clips on alloy." />
    <meta property="og:site_name" content="alloy" />
    <meta property="og:title" content="alloy" />
    <meta
      property="og:description"
      content="Share and watch game clips on alloy."
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="alloy" />
    <meta
      name="twitter:description"
      content="Share and watch game clips on alloy."
    />
    <link rel="apple-touch-icon" href="/logo.png" />
    <!-- alloy:head:end -->
    <link rel="icon" type="image/png" href="/logo.png" />
  </head>
  <body>
    <div id="root"></div>
    <!-- alloy:bootstrap -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
